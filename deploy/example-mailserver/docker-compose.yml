# =============================================================================
# Ejemplo de stack self-hosted: servidor de correo COMPLETO + Webmail 6.0 (Bifrost).
#
# Bifrost reemplaza a Roundcube: es sólo el FRONT (UI + API) — habla IMAP/SMTP con el
# servidor de correo de atrás (acá docker-mailserver). Este compose es una PLANTILLA;
# reemplazá `example.com` por tu dominio, generá los secretos en ./secrets/ y ajustá DNS
# (MX, A, SPF, DKIM, DMARC) antes de producción.
#
# Stack: Traefik (TLS/Let's Encrypt) · docker-mailserver (Postfix+Dovecot) · MongoDB +
# Redis (datos de Bifrost) · Bifrost API + Web.
# =============================================================================
services:
  # --- Reverse proxy + TLS automático -----------------------------------------
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=mailnet
      - --certificatesresolvers.letsencrypt.acme.email=admin@example.com # ← tu email
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/certs
    networks: [mailnet]

  # --- Servidor de correo (SMTP/IMAP) — el "backend" real ---------------------
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:15 # pin a major estable (no :latest → no major-bump sorpresa)
    hostname: mail.example.com # ← tu hostname de correo
    restart: unless-stopped
    ports:
      - '25:25' # SMTP (recepción)
      - '465:465' # Submission implícito TLS (SMTPS) — el login del webmail usa 465/secure por default
      - '587:587' # Submission (STARTTLS)
      - '143:143' # IMAP (STARTTLS)
      - '993:993' # IMAPS
    volumes:
      - ./maildata:/var/mail
      - ./mailstate:/var/mail-state
      - ./maillogs:/var/log/mail
      - ./config:/tmp/docker-mailserver
      # NO :ro — DMS con SSL_TYPE=letsencrypt EXTRAE el cert del acme.json de Traefik y lo ESCRIBE en
      # /etc/letsencrypt/live/<dominio>/; con el montaje read-only crashea en loop ("Read-only file
      # system" al crear live/). Comparte el volumen con Traefik (que escribe acme.json). [deploy real]
      - ./letsencrypt:/etc/letsencrypt
      - /etc/localtime:/etc/localtime:ro
    environment:
      - OVERRIDE_HOSTNAME=mail.example.com
      - ENABLE_FAIL2BAN=1
      - ENABLE_OPENDKIM=1
      - ENABLE_OPENDMARC=1
      - ENABLE_POLICYD_SPF=1
      - SSL_TYPE=letsencrypt # DMS lee el cert del ./letsencrypt/acme.json de Traefik (montado arriba)
      - SSL_DOMAIN=mail.example.com # ← el FQDN cuyo cert busca en acme.json
      - ONE_DIR=1
      - PERMIT_DOCKER=network
    cap_add: [NET_ADMIN, SYS_PTRACE]
    labels:
      # Router "de emisión": sin un router que demande Host(mail.<dominio>), Traefik NO pide ese
      # cert y DMS se queda sin TLS (hallazgo HIGH de B). Esto fuerza la emisión ACME del host; el
      # servicio es un placeholder (lo que importa es disparar el challenge para mail.<dominio>).
      - traefik.enable=true
      - traefik.http.routers.mailcert.rule=Host(`mail.example.com`)
      - traefik.http.routers.mailcert.entrypoints=websecure
      - traefik.http.routers.mailcert.tls.certresolver=letsencrypt
      - traefik.http.services.mailcert.loadbalancer.server.port=8080
    networks: [mailnet]

  # --- Datos de Bifrost -------------------------------------------------------
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes: [mongo-data:/data/db]
    networks: [mailnet]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes: [redis-data:/data]
    networks: [mailnet]

  # --- Bifrost API (reemplaza el backend de Roundcube) ------------------------
  api:
    image: ghcr.io/hrefcl/bifrost/api:latest
    restart: unless-stopped
    depends_on: [mongo, redis]
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      MONGODB_URI: mongodb://mongo:27017/webmail6
      REDIS_URL: redis://redis:6379/0
      # Secretos: generalos con `openssl rand -hex 32` y poné los valores reales (o usá
      # docker secrets). NO commitees valores reales.
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      ENCRYPTION_KEY_FILE: /run/secrets/encryption_key
      FRONTEND_URL: https://webmail.example.com
      CORS_ORIGIN: https://webmail.example.com
      # El box trae su mailserver → el login del webmail defaultea a él y oculta la config manual
      # (webmail NATIVO del dominio). El sed del provisioner lo convierte a mail.<tu-dominio>.
      MAIL_SERVER_HOST: mail.example.com
      # Storage de adjuntos: por defecto LOCAL (disco). Si el provisioner habilitó S3, el .env del box
      # trae STORAGE_PROVIDER=s3 + bucket/region + S3_USE_INSTANCE_ROLE=1 (sin claves: usa el rol del
      # EC2 vía IMDS). En el primer boot el API siembra la config a S3 (services/storage/config.ts).
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_USE_INSTANCE_ROLE: ${S3_USE_INSTANCE_ROLE:-}
      # Bifrost Meet (opcional). TODO con default vacío → con Meet OFF el API arranca igual y la feature
      # queda apagada (meetEnabled() exige estas + el flag del admin). El provisioner llena el .env al
      # activar Meet. `LIVEKIT_API_URL` apunta al contenedor livekit por DNS interno de la red.
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      LIVEKIT_WS_URL: ${LIVEKIT_WS_URL:-}
      LIVEKIT_API_URL: ${LIVEKIT_API_URL:-http://livekit:7880}
      MEET_PUBLIC_BASE_URL: ${MEET_PUBLIC_BASE_URL:-}
    secrets: [jwt_secret, encryption_key]
    networks: [mailnet]

  # --- Bifrost Web (UI — reemplaza a Roundcube) -------------------------------
  web:
    image: ghcr.io/hrefcl/bifrost/web:latest
    restart: unless-stopped
    depends_on: [api]
    environment:
      # CSP deploy-time: con Meet ON el connect-src del SPA suma ` <LIVEKIT_WS_URL>` (espacio líder solo si
      # está seteado) → Meet OFF deja la CSP byte-idéntica (`connect-src 'self'`). El SPA es el documento que
      # abre el wss, así que ESTA CSP (no la de helmet del API) es la que lo habilita; se deriva de la MISMA
      # var que dialea el SDK (`LIVEKIT_WS_URL`) → una sola fuente, sin acoplamiento de 3 vars (review C-F1).
      # COMILLAS DOBLES (review B-HIGH). Nota: `compose-go` interpola post-parse-YAML, así que técnicamente
      # las simples también interpolan; usamos dobles por claridad/consistencia con la review. El
      # `# prettier-ignore` evita que el formatter (singleQuote:true) las revierta.
      # prettier-ignore
      MEET_CSP_CONNECT: "${LIVEKIT_WS_URL:+ }${LIVEKIT_WS_URL:-}"
    labels:
      - traefik.enable=true
      - traefik.http.routers.bifrost.rule=Host(`webmail.example.com`) # ← tu dominio webmail
      - traefik.http.routers.bifrost.entrypoints=websecure
      - traefik.http.routers.bifrost.tls=true
      - traefik.http.routers.bifrost.tls.certresolver=letsencrypt
      - traefik.http.services.bifrost.loadbalancer.server.port=80
    networks: [mailnet]

  # --- Bifrost Meet (LiveKit self-hosted) — OPCIONAL via profile "meet" ---------
  # Con Meet OFF (sin COMPOSE_PROFILES=meet) este servicio NUNCA arranca → la base queda intacta.
  # Al activar Meet, el provisioner setea COMPOSE_PROFILES=meet + las LIVEKIT_* en el .env.
  livekit:
    image: livekit/livekit-server:v1.8.4 # PINNED (no :latest → no major-bump sorpresa)
    profiles: ['meet']
    restart: unless-stopped
    depends_on: [traefik]
    command: ['--config', '/etc/livekit.yaml']
    environment:
      # Claves vía env (no hardcodeadas en el yaml): "<api_key>: <secret>". COMILLAS DOBLES obligatorias:
      # Compose NO interpola `${...}` dentro de comillas simples (review B-HIGH) → con simples quedaría el
      # literal y LiveKit aceptaría una credencial estática conocida.
      # prettier-ignore
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-}: ${LIVEKIT_API_SECRET:-}"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - '7881:7881/tcp' # ICE/TCP (fallback)
      - '7882:7882/udp' # mux UDP single-port
      - '3478:3478/udp' # TURN/STUN UDP embebido
    labels:
      - traefik.enable=true
      - traefik.http.routers.meet.rule=Host(`meet.example.com`) # ← meet.<tu-dominio>
      - traefik.http.routers.meet.entrypoints=websecure
      - traefik.http.routers.meet.tls=true
      - traefik.http.routers.meet.tls.certresolver=letsencrypt
      - traefik.http.services.meet.loadbalancer.server.port=7880
    # Límites de recursos: en el EC2 COMPARTIDO, acotar LiveKit para no privar a mailserver/mongo
    # (review NEW-9; al activar Meet el provisioner sube el piso de instancia a t4g.large).
    mem_limit: 1g
    cpus: 1.0
    networks: [mailnet]

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  encryption_key:
    file: ./secrets/encryption_key.txt

volumes:
  mongo-data:
  redis-data:

networks:
  mailnet:
    driver: bridge
