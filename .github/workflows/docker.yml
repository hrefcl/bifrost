name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  # En PR se CONSTRUYEN las imágenes (sin push, ver `push:` en cada step) para validar los
  # Dockerfiles ANTES del merge — sin esto, una rotura del build sólo se detectaba al pushear
  # a main. Cubre parte de TD-DOCKER-VERIFY (el `docker build` real corre en CI).
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU = emulación para cross-buildear arm64 en el runner amd64 (Graviton es el default del
      # provisioner; las imágenes deben correr en t4g además de x86).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Sello de build → BUILD_NUMBER = contador de GitHub (sube solo en cada corrida), sha y hora UTC.
      # Se hornean en ambas imágenes (build-args) → el admin muestra qué versión corre y detecta cache.
      - name: Build metadata
        id: build
        run: echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # Metadata por imagen → tags reales (branch, semver vX.Y.Z en tags, sha, latest en main).
      - name: Metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          build-args: |
            BUILD_NUMBER=${{ github.run_number }}
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.build.outputs.time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Metadata (Web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/web
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: |
            BUILD_NUMBER=${{ github.run_number }}
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.build.outputs.time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Smoke aislado: el `build` valida que la imagen COMPILA; esto valida que ARRANCA y sirve
  # HTTP (la 2ª mitad de TD-DOCKER-VERIFY). Setup-mode + REDIS_URL=mock → no necesita Mongo/
  # Redis externos. Job separado: si falla, no ensucia el build/push ya verde.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image (smoke)
        run: docker build -f Dockerfile.api -t webmail-api:smoke .

      - name: Run + verify it boots and serves HTTP
        run: |
          docker run -d --name api-smoke -e REDIS_URL=mock -e PORT=3000 -p 3000:3000 webmail-api:smoke
          ok=
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/api/setup/status | grep -q setupRequired; then ok=1; break; fi
            sleep 2
          done
          echo "--- container logs ---"; docker logs api-smoke || true
          docker rm -f api-smoke >/dev/null 2>&1 || true
          if [ -z "$ok" ]; then echo "FALLO: la API no sirvió /api/setup/status"; exit 1; fi
          echo "OK: la imagen API arranca y sirve HTTP en el contenedor"
