name: CI

on:
  # Push a CUALQUIER rama: valida también ramas feature/stacked cuyo PR no apunta a main
  # (esos PRs no disparan el trigger pull_request:[main] → quedaban sin CI).
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Least privilege: el GITHUB_TOKEN sólo necesita leer el repo (no escribe nada).
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Gate de seguridad: falla el build si hay CVEs high/critical en dependencias de PRODUCCIÓN.
      # Previene shippear vulnerabilidades como las de fast-jwt (auth-bypass) / nodemailer que la
      # auto-auditoría encontró manualmente. --prod ignora devDeps (no se shippean) → menos ruido.
      # Si aparece un CVE sin fix disponible, documentar y usar pnpm.auditConfig.ignoreCves
      # (en pnpm v11+ el campo es pnpm.auditConfig.ignoreGhsas).
      - name: Security audit (prod deps)
        run: pnpm audit --prod --audit-level high

      # `@webmail6/shared` resuelve sus tipos desde dist (types: ./dist/index.d.ts). En un
      # checkout limpio dist no existe, así que typecheck/lint/test de api y web no pueden
      # resolver el paquete. Se construye primero (en orden de dependencias lo necesitan todos).
      - name: Build shared package
        run: pnpm --filter @webmail6/shared build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Tests + coverage
        run: pnpm test:coverage
        env:
          NODE_ENV: test
          ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          JWT_SECRET: supersecretkeysupersecretkey123456
          MONGODB_URI: mongodb://localhost:27017/webmail_test
          REDIS_URL: mock

      - name: Build
        run: pnpm build

      # Gate de los artefactos del TURNKEY: valida el template CloudFormation (cfn-lint) y el user-data
      # bash (shellcheck) que GENERA el provisioner. Atrapa regresiones que romperían el deploy real en
      # AWS y que los unit tests NO ven (validez contra el spec de CFN / sintaxis+semántica de shell).
      # La auto-auditoría encontró 2 bugs reales así: la Rule subnet/VPC y el readiness sin signal a CFN.
      - name: Install artifact linters
        run: |
          pipx install cfn-lint
          shellcheck --version >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y shellcheck)
      - name: Validate provisioning artifacts (CFN template + user-data)
        run: |
          node packages/provisioner/scripts/emit-artifacts.mjs artifacts
          # --non-zero-exit-code error: los W1030 (falsos positivos por defaults vacíos guardados por
          # Fn::If/Condition) se MUESTRAN pero no rompen; sólo un ERROR real de CFN-spec falla el build.
          cfn-lint --non-zero-exit-code error artifacts/bifrost-stack.yaml
          # shellcheck a severity=warning: los infos SC2015 (retry idiom seguro) / SC1091 (/etc/os-release)
          # no rompen; un warning/error real (var sin usar, quoting peligroso) sí.
          shellcheck --severity=warning artifacts/user-data.sh
