version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: webmail6-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: webmail6

  redis:
    image: redis:7-alpine
    container_name: webmail6-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

volumes:
  mongo-data:
  redis-data:
