<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bifrost 6.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet" />
<style>
  :root {
    --accent: #1b66ff;
    --accent-700: #1450cc;
    --danger: #dc2626;
  }
  html[data-theme="light"] {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --surface-dim: #fbfcfe;
    --border: #e6e9f0;
    --border-strong: #c7cdda;
    --text-1: #1c2128;
    --text-2: #5a6472;
    --text-3: #8e98a8;
    --hover: rgba(20,30,50,.05);
    --search-bg: #eaeef6;
    --accent-soft: color-mix(in srgb, var(--accent) 12%, var(--surface));
    --accent-ink: color-mix(in srgb, var(--accent) 86%, #000);
    --accent-300: #9cc0ff;
    --compose-bg: color-mix(in srgb, var(--accent) 14%, #fff);
    --compose-fg: var(--accent-ink);
    --composer-head: var(--accent);
    --toast-bg: #2a2f3a;
    --toast-fg: #f3f5f8;
    --shadow-sm: 0 1px 2px rgba(20,30,50,.10), 0 1px 3px rgba(20,30,50,.06);
    --shadow-md: 0 2px 8px rgba(20,30,50,.14);
    --shadow-lg: 0 12px 36px rgba(20,30,50,.20), 0 4px 12px rgba(20,30,50,.12);
  }
  html[data-theme="dark"] {
    --bg: #0d0f14;
    --surface: #161a21;
    --surface-dim: #13161c;
    --border: #262c37;
    --border-strong: #3a4350;
    --text-1: #e7eaf0;
    --text-2: #9aa4b3;
    --text-3: #69727f;
    --hover: rgba(255,255,255,.06);
    --search-bg: #1f242d;
    --accent-soft: color-mix(in srgb, var(--accent) 22%, var(--surface));
    --accent-ink: color-mix(in srgb, var(--accent) 55%, #fff);
    --accent-300: #7faaff;
    --compose-bg: color-mix(in srgb, var(--accent) 20%, var(--surface));
    --compose-fg: color-mix(in srgb, var(--accent) 40%, #fff);
    --composer-head: color-mix(in srgb, var(--accent) 70%, #000);
    --toast-bg: #2c333f;
    --toast-fg: #f3f5f8;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.5);
    --shadow-md: 0 2px 10px rgba(0,0,0,.55);
    --shadow-lg: 0 14px 40px rgba(0,0,0,.6);
  }
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; }
  body {
    font-family: "Public Sans", system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text-1);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 6px; border: 3px solid var(--surface); }
  ::-webkit-scrollbar-track { background: transparent; }
  input::placeholder, textarea::placeholder { color: var(--text-3); }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="webmail/icons.jsx"></script>
<script type="text/babel" src="webmail/data.jsx"></script>
<script type="text/babel" src="webmail/ui.jsx"></script>
<script type="text/babel" src="webmail/login.jsx"></script>
<script type="text/babel" src="webmail/inbox.jsx"></script>
<script type="text/babel" src="webmail/composer.jsx"></script>
<script type="text/babel" src="webmail/search.jsx"></script>
<script type="text/babel" src="webmail/calendar.jsx"></script>
<script type="text/babel" src="webmail/settings.jsx"></script>
<script type="text/babel" src="webmail/app.jsx"></script>
</body>
</html>
