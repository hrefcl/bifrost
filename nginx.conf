server {
  listen 80;
  server_name localhost;
  root /usr/share/nginx/html;
  index index.html;

  # CSP del SPA: defensa en profundidad. script-src 'self' bloquea scripts inline
  # (mitiga XSS aunque algo escape al sanitizador del backend). img https: permite
  # imágenes remotas de emails (bloquearlas/proxearlas por privacidad → follow-up F4).
  # font-src 'self' data:: FullCalendar embebe su icon-font (fcicons) como data: TTF; sin
  # esto `default-src` la bloqueaba (violación CSP recurrente en /calendar). data: en font-src
  # es seguro — las fuentes no ejecutan código (a diferencia de data: en script-src).
  # NOTA: `add_header` en un `location` NO hereda los del server → se re-declaran abajo
  # en cada location que agrega sus propios headers (cache).
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https:; connect-src 'self'${MEET_CSP_CONNECT}; frame-ancestors 'none'; base-uri 'self'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;

  # Assets con HASH en el nombre (index-XXXX.js / .css): inmutables → cache largo. Un deploy nuevo
  # trae nombres nuevos, así que cachearlos "para siempre" es seguro y rápido.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  # Métricas: NO se exponen al público (Prometheus scrapea api:3000/api/metrics
  # directamente en la red interna). Regex (prioridad sobre prefix /api) que cubre
  # /api/metrics, /api/metrics/ y /api/metrics/... — el exact `=` dejaba pasar la
  # variante con trailing slash.
  location ~ ^/api/metrics(/|$) {
    deny all;
    return 403;
  }

  location /api {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    # SET (no append) X-Forwarded-For al IP REAL del cliente. `$proxy_add_x_forwarded_for`
    # appendea el XFF que mande el cliente → con trustProxy:true Fastify tomaría ese IP
    # spoofeado y el atacante saltearía el rate limit de login/refresh.
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
    # index.html (y el fallback SPA) NUNCA se cachea: si no, el browser sirve un index VIEJO que
    # apunta a un bundle viejo y un deploy nuevo no se ve hasta limpiar cache. Los assets hasheados
    # sí se cachean (arriba). `add_header` re-declara los de seguridad (no se heredan en location).
    add_header Cache-Control "no-cache, must-revalidate" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https:; connect-src 'self'${MEET_CSP_CONNECT}; frame-ancestors 'none'; base-uri 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
  }
}
